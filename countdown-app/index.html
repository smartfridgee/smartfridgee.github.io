<!DOCTYPE html>
<html lang="pl">
<head>
    <title>Countdown</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="shortcut icon" href="images/favicon/favicon.ico" type="image/x-icon">
    <script defer src="scripts/script.js"></script>
    <!-- <script defer src="https://kit.fontawesome.com/c678fbcbae.js" crossorigin="anonymous"></script> -->
</head>
<body>
    <!-- <div class="header-container">
        <h1>Time left to:</h1>
        <button><h2 id="date">Date</h2><i class="far fa-hand-pointer"></i></button>
    </div> -->
    <div class="header-container">
        <h1>Time to Robak's Birthday</h1>
    </div>
    <div class="countdown-container">
        <div class="element">
            <span id="days">0</span>
            <p>days</p>
        </div>
        <div class="element">
            <span id="hours">0</span>
            <p>hours</p>
        </div>
        <div class="element">
            <span id="minutes">0</span>
            <p>minutes</p>
        </div>
        <div class="element">
            <span id="seconds">0</span>
            <p>seconds</p>
        </div>
    </div>
</body>
</html>
