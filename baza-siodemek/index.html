<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baza Niecodziennych Siódemek</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="scripts/data.js"></script>
    <script defer src="scripts/main.js"></script>
</head>
<body>
    <header>
        <h1>Baza Siódemek</h1>
    </header>
    <section class="table-area">
        <div class="block">
            <div class="filters">
                <br>
                <input type="text" name="search" id="search" placeholder="Szukaj" onkeyup="dataShuffle.search()">
                <br>
                <select name="railway" id="railway" onchange="dataShuffle.sort()">
                    <option value="empty">- Wybierz Przewoźnika -</option>
                </select>
                <br>
            </div>
            <table id="data_table">
                <th>Seria</th>
                <th>Numer</th>
                <th>Typ</th>
                <th>Lampy</th>
                <th>Malowanie</th>
                <th>Pantografy</th>
                <th>Przewoźnik</th>
                <tbody id="table_content">

                </tbody>
            </table>
            <br>
        </div>
    </section>
    <footer>
        <h4>&copy smartfridgee 2021</h4>
    </footer>
</body>
</html>
