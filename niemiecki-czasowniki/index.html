<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niemiecki</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: grid;
            place-items: center;
            gap: 2em;
            height: 100vh;
        }

        input {
            font-size: 1.2em;
            padding: 0.2em;
            border: 2px solid grey;
        }

        main {
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 5em;
        }

        div {
            display: flex;
            justify-content: center;
            gap: 1em;
        }

        button {
            padding: 0.5em;
        }
    </style>
    <script src="czasowniki.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <main>
        <h1 id="czasow"></h1>
        <div>
            <input type="text" placeholder="Infinitiv" id="inf">
            <input type="text" placeholder="Präteritum" id="prat">
            <input type="text" placeholder="Partizip II" id="pzip">
        </div>
        <button onclick="checkIfCorrect()">Enter</button>
        <p id="count"></p>
    </main>
</body>
</html>
