<!doctype HTML>
<html lang="pl-PL">
    <head>
		<meta charset="utf-8">
		<title>RandkaPicker</title>
		<meta name="author" content="Bastian Wierzchnicki, Julia Waszkiewicz">
		<meta name="description" content="RandkaPicker">
		<meta name="keywords" content="HTML, CSS, JavaScript, App">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Saira&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="css/style.css">
    </head>
    <body>
		<div id="loadingScreen" class=""><img id="loadingShark" src="images/loading/shark.png"></div>
		<div id="background"></div>
		<div class="mainHeader">RandkaPicker</div>
		<div id="mainMenu">
			<div id="title" class="mainMenuTitle">WYBIERZ</div>
			<div class="mainMenuForm">
				<div class="formOptionL">
					<div class="image" style="background-image: url('images/menu/sharkHome.png')" onclick="playAudio('audio/pop.ogg')"></div>
					<div id="inputOne" class="rest">
						<div class="title">Samotny Domek</div>
						<div class="option" value="true">Tak</div>
						<div class="option" value="false">Nie</div>
					</div>
				</div>
				<div class="formOptionR">
					<div class="image" style="background-image: url('images/menu/sharkAnxiety.png')" onclick="playAudio('audio/pop.ogg')"></div>
					<div id="inputTwo" class="rest">
						<div class="title">Anxiety</div>
						<div class="option" value="true">Tak</div>
						<div class="option" value="false">Nie</div>
					</div>
				</div>
				<div class="formOptionL">
					<div class="image" style="background-image: url('images/menu/sharkWeather.png')" onclick="playAudio('audio/pop.ogg')"></div>
					<div id="inputThree" class="rest">
						<div class="title">Dobra Pogoda</div>
						<div class="option" value="true">Tak</div>
						<div class="option" value="false">Nie</div>
					</div>
				</div>
				<div class="formOptionR">
					<div class="image" style="background-image: url('images/menu/sharkStronk.png')" onclick="playAudio('audio/scream.ogg')"></div>
					<div id="inputFour" class="rest">
						<div class="title">Stronk & Will</div>
						<div class="option" value="true">Tak</div>
						<div class="option" value="false">Nie</div>
					</div>
				</div>
				<div class="formOptionL">
					<div class="image" style="background-image: url('images/menu/sharkFood.png')" onclick="playAudio('audio/pop.ogg')"></div>
					<div id="inputFive" class="rest">
						<div class="title">Jedzonko</div>
						<div class="option" value="true">Tak</div>
						<div class="option" value="false">Nie</div>
					</div>
				</div>
				<div class="formButton">
					<button id="button" class="button" onclick="formSubmit()">Potwierdź</button>
				</div>
			</div>
		</div>
		<div class="mainFooter">Copyright &copy; cutieS</div>
    </body>
	<script src="scripts/formInput.js"></script>
	<script src="scripts/dateList.js"></script>
	<script src="scripts/main.js"></script>
</html>
