<!doctype HTML>
<html lang="pl-PL">
    <head>
		<meta charset="utf-8">
		<title>Ultimate Conventer</title>
		<meta name="author" content="Bastian Wierzchnicki">
		<meta name="description" content="UltimateConventer">
		<meta name="keywords" content="HTML, CSS, JavaScript, Conventer">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=KoHo:wght@200;300;400&display=swap" rel="stylesheet">
		<link rel="shortcut icon" href="images/favicon/favicon.ico" type="image/x-icon">
		<link rel="icon" href="images/favicon/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="css/style.css">
    </head>
    <body>
		<header>
			<div class="container text-center center title-padding">
				<div class="split-nav"><h1>UltimateConventer</h1><button id="navbutton" class="nav-button text-center"><div class="nav-arrow"> &#8801; </div></button></div>
				<div id="nav" class="split padding-header tab">
					<a href="#text">tekst</a>
					<a href="#metrics">miary</a>
					<a href="#weights">masy</a>
					<a href="#speeds">prędkości</a>
				</div>
			</div>
		</header>
		<section id="text">
			<div class="container text-center center section-bkg section-padding section-border">
				<h2>tekst</h2>
				<br>
				<textarea id="textinput" placeholder="wpisz tekst"></textarea>
				<div class="split-section button-padding">
					<button class="button" value="uppercase">duże litery</button>
					<button class="button" value="lowercase">małe litery</button>
					<button class="button" value="startcase">początek wyrazów</button>
					<button class="button" value="sentencecase">zdanie</button>
					<button class="button" value="mixedst">mieszane1</button>
					<button class="button" value="mixednd">mieszane2</button>
				</div>
			</div>
		</section>
		<section id="metrics">
			<div class="container text-center center section-bkg section-padding section-border" style="background-color: #262626;">
				<h2>miary</h2>
				<br>
				<!--CONVERT-->
				<h3>metrics</h3>
				<div id="mtconv" class="split-option">
					<div>
						<input type="number" id="mtarea" placeholder="wpisz wartość">
						<select id="metricsIPT">
							<option value="mm">mm</option>
							<option value="cm">cm</option>
							<option value="m">m</option>
							<option value="km">km</option>
						</select>
					</div>
					<div class="arrow">
						>
					</div>
					<div>
						<input type="number" id="mtoutput" placeholder="output" disabled>
						<select id="metricsOPT">
							<option value="mm">mm</option>
							<option value="cm">cm</option>
							<option value="m">m</option>
							<option value="km">km</option>
						</select>
					</div>
				</div>
				<!--TO FEET-->
				<h3>metrics to inches</h3>
				<div id="mttoft" class="split-option">
					<div>
						<input type="number" id="ftarea" class="unavailable" placeholder="niedostępne" disabled>
						<select id="" disabled>
							<option value="mm">mm</option>
							<option value="cm">cm</option>
							<option value="m">m</option>
							<option value="km">km</option>
						</select>
					</div>
					<div class="arrow">
						>
					</div>
					<div>
						<input type="number" id="ftoutput" class="unavailable" placeholder="niedostępne" disabled>
						<select id="" disabled>
							<option value="inch">inch</option>
							<option value="ft">ft</option>
							<option value="mi">mi</option>
						</select>
					</div>
				</div>
				<h3>inches to metrics</h3>
				<div id="fttomt" class="split-option">
					<div>
						<input type="number" id="fmarea" class="unavailable" placeholder="niedostępne" disabled>
						<select id="" disabled>
							<option value="inch">inch</option>
							<option value="ft">ft</option>
							<option value="mi">mi</option>
						</select>
					</div>
					<div class="arrow">
						>
					</div>
					<div>
						<input type="number" id="fmoutput" class="unavailable" placeholder="niedostępne" disabled>
						<select id="" disabled>
							<option value="mm">mm</option>
							<option value="cm">cm</option>
							<option value="m">m</option>
							<option value="km">km</option>
						</select>
					</div>
				</div>
			</div>
		</section>
		<section id="weights">
			<div class="container text-center center section-bkg section-padding section-border">
				<h2>masy</h2>
				<br>
				<div id="wghconv" class="split-option">
					<div>
						<input type="number" id="wgharea" placeholder="wpisz wartość">
						<select id="weightsIPT">
							<option value="g">g</option>
							<option value="ml">ml</option>
							<option value="dag">dag</option>
							<option value="l">l</option>
							<option value="kg">kg</option>
							<option value="t">t</option>
						</select>
					</div>
					<div class="arrow">
						>
					</div>
					<div>
						<input type="number" id="wghoutput" placeholder="output" disabled>
						<select id="weightsOPT">
							<option value="g">g</option>
							<option value="ml">ml</option>
							<option value="dag">dag</option>
							<option value="l">l</option>
							<option value="kg">kg</option>
							<option value="t">t</option>
						</select>
					</div>
				</div>
		</section>
		<section id="speeds">
			<div class="container text-center center section-bkg section-padding section-border" style="background-color: #262626;">
				<h2>prędkości</h2>
				<br>
				<div id="spdconv" class="split-option">
					<div>
						<input type="number" id="spdarea" placeholder="wpisz wartość">
						<select id="speedsIPT">
							<option value="kmh">kmh</option>
							<option value="mph">mph</option>
						</select>
					</div>
					<div class="arrow">
						>
					</div>
					<div>
						<input type="number" id="spdoutput" placeholder="output" disabled>
						<select id="speedsOPT">
							<option value="mph">mph</option>
							<option value="kmh">kmh</option>
						</select>
					</div>
				</div>
		</section>
		<footer class="section-padding text-center">
			<text>copyright &copy 2021 smartfridgee
		</footer>
		<script src="scripts/main.js"></script>
    </body>
</html>
